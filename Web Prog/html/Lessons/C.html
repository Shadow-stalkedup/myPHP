<style>
    .Subscribe-button {
        Background-color: rgb(204, 0, 0);
        color: white;
        border: none;
        padding-top: 8px;
        padding-bottom: 8px;
        padding-left: 24px;
        padding-right: 24px;
        border-radius: 2px;
        cursor: pointer;
        margin-right: 8px;
        transition: opacity 0.15s;
    }
    .Subscribe-button:hover{
        opacity: 0.8;
    }

    .Subscribe-button:active{
        opacity: 0.5;
    }
    .Join-button {
        background-color: white;
        border-color: rgb(6, 95, 212);
        border-style: solid;
        border-width: 1px;
        color: rgb(6, 95, 212);
        padding-top: 7px;
        padding-bottom: 7px;
        padding-left: 15px;
        padding-right: 15px;
        border-radius: 2px;
        cursor: pointer;
        transition: background-color 0.15s,
        color 0.15s;

    }
    
    .Join-button:hover{
        background-color: rgb(41, 118, 211);
        color: white;
    }
    .Join-button:active{
        opacity: 0.7;
    }
    .Tweet-button {
        background-color: rgb(29, 155, 240);
        color: white;
        border: none;
        padding-top: 8px;
        padding-bottom: 8px;
        padding-left: 15px;
        padding-right: 15px;
        border-radius: 18px;
        font-weight: bold;
        font-size: 15px;
        cursor: pointer;
        margin-left: 8px;
        transition: box-shadow 0.15s;
    }

    .Tweet-button:hover{
        box-shadow: 5px 5px 10px rgba(0,0,0,0.15);
    }
</style>


<button class="Subscribe-button">
    Subscribe
</button>

<button class="Join-button">
    Join
</button>

<button class="Tweet-button">
    Tweet
</button>
