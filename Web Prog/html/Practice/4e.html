<style>
    .apply{
        background-color: rgb(10,102,194);
        color: white;
        border: none;
        padding-top: 8px;
        padding-bottom: 8px;
        padding-left: 15px;
        padding-right: 15px;
        border-radius: 16px;
        font-weight: bold;
        cursor: pointer;
        margin-right: 10px;
        transition: background-color 0.15s;
    }
    .apply:hover{
        background-color: rgb(9, 79, 150);
    }
    .save{
        background-color: white;
        color: rgb(10,102,194);
        padding-top: 7px;
        padding-bottom: 7px;
        padding-left: 15px;
        padding-right: 15px;
        border-color: rgb(10,102,194);
        border-radius: 16px;
        border-width: 1px;
        font-weight: bold;
        cursor: pointer;
        transition: background-color 0.15s,
        border-width 0.15s;
    }
    .save:hover{
        border-width: 2px;
        background-color: rgb(223, 238, 253);
    }
    </style>

<button class="apply">
    Apply on company website
</button>

<button class="save">
    Save
</button>
