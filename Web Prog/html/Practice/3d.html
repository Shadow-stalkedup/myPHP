<style>
.get{
    background-color: rgb(121, 82, 179);
    color: white;
    border: none;
    border-radius: 2px;
    height: 32px;
    width: 110px;
    font-weight: bold;
    cursor: pointer;
    margin-right: 5px;
    transition: background-color 0.15s;
}
.get:hover{
    background-color: rgb(111, 70, 173);
}
.down{
    color: rgb(54, 67, 78);
    background-color: white;
    border-width: 1px;
    border-radius: 2px;
    height: 32px;
    width: 100px;
    font-weight: bold;
    cursor: pointer;
    transition: color 0.15s,
    background-color 0.15s;
}
.down:hover{
    color: white;
    background-color: rgb(54, 67, 78);
}
</style>

<button class="get">
    Get started
</button>

<button class="down">
    Download
</button>
